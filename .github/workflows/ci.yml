name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build (standalone bundle)
        run: npm run build

      - name: Verify packed install
        run: |
          npm pack
          SANDBOX=$(mktemp -d)
          cd "$SANDBOX"
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE"/agentgraphed-*.tgz --no-audit --no-fund
          # Boot the binary, hit it once, kill it.
          AGENTGRAPHED_DATA_DIR=$SANDBOX/.data AGENTGRAPHED_PORT=4747 \
            ./node_modules/.bin/agentgraphed &
          PID=$!
          for i in {1..30}; do
            if curl -sf http://localhost:4747/ > /dev/null; then break; fi
            sleep 1
          done
          curl -sf -o /dev/null -w "GET / → %{http_code}\n" http://localhost:4747/
          kill $PID
